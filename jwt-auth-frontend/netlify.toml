[build]
  command = "npm run build"
  publish = "build"
  environment = { NODE_VERSION = "18", REACT_APP_API_URL = "https://jwt-auth-backend-7fmj.onrender.com" }

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server"
  status = 200
