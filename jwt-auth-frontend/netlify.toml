[build]
  base = "jwt-auth-frontend"
  command = "npm ci --no-optional && npm run build"
  publish = "build"
  functions = "netlify/functions"
  environment = { NODE_VERSION = "20", REACT_APP_API_URL = "https://jwt-auth-backend-obe2.onrender.com" }

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/:splat"
  status = 200

[functions]
  directory = "netlify/functions"
